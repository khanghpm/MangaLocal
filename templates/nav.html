<nav
  class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50 px-4 md:px-8 py-3 md:py-4"
>
  <div
    class="max-w-7xl mx-auto flex flex-wrap md:flex-nowrap items-center justify-between gap-y-3 gap-x-2 md:gap-4"
  >
    <a
      href="/"
      class="text-xl md:text-2xl font-bold text-orange-500 flex items-center gap-2 md:gap-3 group order-1"
    >
      <img
        src="{{ url_for('static', filename='js/logo.png') }}"
        alt="MangaLocal Logo"
        class="h-8 md:h-9 w-auto object-contain group-hover:scale-110 transition-transform duration-200"
      />
      MangaLocal
    </a>

    <div
      class="order-4 md:order-2 w-full md:w-auto flex justify-around md:justify-start gap-2 md:gap-6 text-sm font-medium text-gray-400 pt-2 md:pt-0 border-t border-gray-800/40 md:border-none mt-1 md:mt-0"
    >
      <a
        href="/"
        class="flex items-center gap-2 hover:text-white transition p-2 md:p-0"
      >
        <svg
          class="w-5 h-5 md:w-4 md:h-4"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <path
            d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"
          ></path>
        </svg>
        <span class="hidden md:inline">Home</span>
      </a>
      <a
        href="/search"
        class="flex items-center gap-2 hover:text-white transition p-2 md:p-0"
      >
        <svg
          class="w-5 h-5 md:w-4 md:h-4"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          ></path>
        </svg>
        <span class="hidden md:inline">Search</span>
      </a>
      <a
        href="/random"
        class="flex items-center gap-2 hover:text-white transition p-2 md:p-0"
      >
        <svg
          class="w-5 h-5 md:w-4 md:h-4"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
          ></path>
        </svg>
        <span class="hidden md:inline">Random</span>
      </a>
    </div>

    <form
      action="/search"
      method="GET"
      class="relative w-full md:w-80 lg:w-96 order-3 md:order-3 my-1 md:my-0"
      id="search-form"
    >
      <input
        type="text"
        id="search-input"
        name="q"
        placeholder="Quick Search..."
        autocomplete="off"
        class="w-full bg-gray-800 border border-gray-700 rounded-lg py-2 px-4 focus:outline-none focus:border-orange-500 transition text-sm text-white"
      />
      <div
        id="live-results"
        class="absolute left-0 right-0 top-full mt-2 bg-[#1a1a1a] border border-gray-800 rounded-xl shadow-2xl overflow-hidden hidden z-[110]"
      ></div>
    </form>

    <div class="order-2 md:order-4 w-auto flex justify-end">
      {% if current_user.is_authenticated %}
        <div class="relative inline-block text-left">
          <button
            onclick="toggleAccountDropdown(event)"
            class="flex items-center gap-3 px-3 py-1.5 rounded-lg hover:bg-white/5 transition-colors group"
          >
            {% if current_user.profile_pic %}
              <img
                src="{{ current_user.profile_pic }}"
                alt="Avatar"
                class="w-8 h-8 rounded object-cover border border-orange-500/30 group-hover:border-orange-500 transition-all"
              />
            {% else %}
              <div
                class="w-8 h-8 rounded bg-orange-500/20 flex items-center justify-center text-orange-500 font-bold border border-orange-500/30 group-hover:border-orange-500 transition-all"
              >
                {{ (current_user.username or current_user.email)[0] | upper }}
              </div>
            {% endif %}

            <span
              class="hidden sm:flex items-center text-xs text-gray-400 font-bold uppercase tracking-widest"
            >
              {{ current_user.username or current_user.email.split('@')[0] }}
              {% if current_user.is_supporter %}
                <span
                  class="text-red-500 font-black ml-1 text-base leading-none"
                  title="Premium Supporter"
                  >+</span
                >
              {% endif %}
            </span>
            <svg
              id="dropdown-arrow"
              class="w-4 h-4 text-gray-600 transition-transform duration-200"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7 7-7-7"
              ></path>
            </svg>
          </button>

          <div
            id="account-dropdown"
            class="absolute right-0 mt-2 w-48 rounded-xl bg-[#1a1a1a] border border-gray-800 shadow-2xl overflow-hidden z-[100] transition-all duration-200 transform opacity-0 scale-95 pointer-events-none origin-top-right"
          >
            <div class="p-2 space-y-1">
              <a
                href="/bookmarks"
                class="flex items-center gap-3 px-3 py-2.5 text-[11px] font-bold text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition"
              >
                <span class="text-base">🔖</span> Bookmarks
              </a>
              <a
                href="/history"
                class="flex items-center gap-3 px-3 py-2.5 text-[11px] font-bold text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition"
              >
                <span class="text-base">🕒</span> History
              </a>
              <a
                href="/support-us"
                class="flex items-center gap-3 px-3 py-2.5 text-[11px] font-bold text-orange-500 hover:bg-orange-500/10 rounded-lg transition"
              >
                <span class="text-base">💎</span> Subscription
              </a>
              <a
                href="/setting"
                class="flex items-center gap-3 px-3 py-2.5 text-[11px] font-bold text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition"
              >
                <span class="text-base">⚙️</span> Settings
              </a>
              {% if current_user.is_admin %}
                <a
                  href="/admin"
                  class="flex items-center gap-3 px-3 py-2.5 text-[11px] font-bold text-yellow-500 hover:bg-yellow-500/10 rounded-lg transition"
                >
                  <span class="text-base">⚡</span> Command Center
                </a>
              {% endif %}
              <div class="h-px bg-gray-800 my-1 mx-2"></div>
              <!-- NÚT CÔNG TẮC SAFE CONTENT -->
              <div
                onclick="toggleSafeMode(event)"
                class="flex items-center justify-between px-3 py-2.5 hover:bg-white/5 rounded-lg transition cursor-pointer group"
              >
                <div
                  class="flex items-center gap-3 text-[11px] font-bold text-gray-400 group-hover:text-white transition"
                >
                  <span class="text-base">🛡️</span> Safe Content
                </div>
                <!-- Track & Thumb của Công tắc -->
                <button
                  type="button"
                  aria-label="Toggle Safe Content"
                  class="relative inline-flex h-4 w-8 shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none"
                >
                  <!-- Thanh chạy (Track) -->
                  <span
                    id="safe-toggle-track"
                    class="pointer-events-none absolute mx-auto h-3 w-8 rounded-full transition-colors duration-200 ease-in-out {% if session.get('safe_mode_v2', True) %}bg-orange-500{% else %}bg-gray-600{% endif %}"
                  ></span>

                  <span
                    id="safe-toggle-thumb"
                    class="pointer-events-none absolute left-0 inline-block h-4 w-4 transform rounded-full border border-gray-300 bg-white shadow-sm transition-transform duration-200 ease-in-out {% if session.get('safe_mode_v2', True) %}translate-x-4{% else %}translate-x-0{% endif %}"
                  ></span>
                </button>
              </div>
              <a
                href="/logout"
                class="flex items-center gap-3 px-3 py-2.5 text-[11px] font-bold text-red-500 hover:bg-red-500/10 rounded-lg transition"
              >
                <span class="text-base">➡</span> Logout
              </a>
            </div>
          </div>
        </div>
      {% else %}
        <div
          onclick="toggleSafeMode(event)"
          class="flex items-center gap-2 px-3 py-2 mr-2 hover:bg-white/5 rounded-lg transition cursor-pointer group"
          title="Toggle Safe Content"
        >
          <span class="text-sm group-hover:scale-110 transition-transform"
            >🛡️</span
          >
          <button
            type="button"
            aria-label="Toggle Safe Content"
            class="relative inline-flex h-4 w-8 shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none"
          >
            <span
              id="guest-safe-toggle-track"
              class="pointer-events-none absolute mx-auto h-3 w-8 rounded-full transition-colors duration-200 ease-in-out {% if session.get('safe_mode_v2', True) %}bg-orange-500{% else %}bg-gray-600{% endif %}"
            ></span>
            <span
              id="guest-safe-toggle-thumb"
              class="pointer-events-none absolute left-0 inline-block h-4 w-4 transform rounded-full border border-gray-300 bg-white shadow-sm transition-transform duration-200 ease-in-out {% if session.get('safe_mode_v2', True) %}translate-x-4{% else %}translate-x-0{% endif %}"
            ></span>
          </button>
        </div>

        <button
          onclick="openAuth()"
          class="text-sm font-bold bg-gray-800 px-4 py-2 rounded hover:bg-gray-700 transition border border-gray-700 shadow-lg"
        >
          Login
        </button>
      {% endif %}
    </div>
  </div>
</nav>
