<nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50 px-8 py-4">
 <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
  <div class="flex items-center gap-8">
   <a href="/" class="text-2xl font-bold text-orange-500 flex items-center gap-2 group">
    <span class="bg-orange-500 text-black px-2 py-1 rounded group-hover:bg-white transition-colors">W</span>
    MangaLocal
   </a>
   <div class="hidden md:flex gap-6 text-sm font-medium text-gray-400">
    <!-- Home Tab with Icon -->
    <a href="/" class="flex items-center gap-2 hover:text-white transition">
     <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
     Home
    </a>
    <!-- NEW: Advanced Search Tab with Icon -->
    <a href="/search" class="flex items-center gap-2 hover:text-white transition">
     <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
     Search
    </a>
    <!-- Random Tab with Icon -->
    <a href="/random" class="flex items-center gap-2 hover:text-white transition">
     <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
     Random
    </a>
   </div>
  </div>

  <form action="/search" method="GET" class="relative w-full md:w-96" id="search-form">
   <input type="text" id="search-input" name="q" placeholder="Quick Search..." autocomplete="off" class="w-full bg-gray-800 border border-gray-700 rounded-lg py-2 px-4 focus:outline-none focus:border-orange-500 transition text-sm text-white" />

   <!-- LIVE SUGGESTIONS DROPDOWN -->
   <div id="live-results" class="absolute left-0 right-0 top-full mt-2 bg-[#1a1a1a] border border-gray-800 rounded-xl shadow-2xl overflow-hidden hidden z-[110]">
    <!-- JavaScript will inject results here -->
   </div>
  </form>

  <div class="hidden md:block">
   {% if current_user.is_authenticated %}
   <div class="relative inline-block text-left">
    <button onclick="toggleAccountDropdown(event)" class="flex items-center gap-3 px-3 py-1.5 rounded-lg hover:bg-white/5 transition-colors group">
     <div class="w-8 h-8 rounded bg-orange-500/20 flex items-center justify-center text-orange-500 font-bold border border-orange-500/30 group-hover:border-orange-500 transition-all">{{ current_user.email[0] | upper }}</div>
     <span class="text-xs text-gray-400 font-bold uppercase tracking-widest">{{ current_user.email.split('@')[0] }}</span>
     <svg id="dropdown-arrow" class="w-4 h-4 text-gray-600 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
     </svg>
    </button>

    <div id="account-dropdown" class="absolute right-0 mt-2 w-52 rounded-xl bg-[#1a1a1a] border border-gray-800 shadow-2xl overflow-hidden z-[100] transition-all duration-200 transform opacity-0 scale-95 pointer-events-none origin-top-right">
     <div class="p-2 space-y-1">
      <a href="/bookmarks" class="flex items-center gap-3 px-3 py-2.5 text-[11px] font-bold text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition"> <span class="text-base">🔖</span> Bookmarks </a>
      <a href="/profile" class="flex items-center gap-3 px-3 py-2.5 text-[11px] font-bold text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition"> <span class="text-base">👤</span> Profile </a>
      <a href="/setting" class="flex items-center gap-3 px-3 py-2.5 text-[11px] font-bold text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition"> <span class="text-base">⚙️</span> Settings </a>
      <div class="h-px bg-gray-800 my-1 mx-2"></div>
      <a href="/logout" class="flex items-center gap-3 px-3 py-2.5 text-[11px] font-bold text-red-500 hover:bg-red-500/10 rounded-lg transition"> <span class="text-base">➡</span> Logout </a>
     </div>
    </div>
   </div>
   {% else %}
   <button onclick="openAuth()" class="text-sm font-bold bg-gray-800 px-4 py-2 rounded hover:bg-gray-700 transition border border-gray-700">Login</button>
   {% endif %}
  </div>
 </div>
</nav>
