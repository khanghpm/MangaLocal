<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <!-- This line fixes the warning in your screenshot -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>New Password</title>
 </head>
 <body class="bg-zinc-950 text-white flex items-center justify-center min-h-screen">
  <div class="bg-zinc-900 p-8 rounded-2xl border border-zinc-800 w-full max-w-md">
   <h2 class="text-xl font-bold mb-6">Enter New Password</h2>

   <form method="POST">
    <input type="password" name="password" placeholder="New Password" required class="w-full bg-black border border-zinc-800 rounded-lg py-3 px-4 mb-4 focus:outline-none focus:border-orange-500 transition" />

    <button type="submit" class="w-full bg-orange-600 py-3 rounded-lg font-bold hover:bg-orange-500 transition">Update Password</button>
   </form>
  </div>
  {% include 'auth_modal.html' %}
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
 </body>
</html>
