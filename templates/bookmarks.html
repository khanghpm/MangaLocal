<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>My Bookmarks - MangaLocal</title>
  </head>
  <body class="bg-black text-gray-200 min-h-screen flex flex-col">
    {% include 'nav.html' %}

    <main class="flex-grow bg-[#1a1a1a] pb-12">
      <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex items-center gap-2 mb-6">
          <svg
            class="w-6 h-6 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"
            ></path>
          </svg>
          <h1 class="text-2xl font-bold text-white">
            My Bookmarks ({{ bookmarks|length }})
          </h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          {% for b in bookmarks %}
            <div
              id="bookmark-card-{{ b.manga_id }}"
              class="bg-[#1a1a1a] rounded-lg p-4 border border-gray-800 relative group flex flex-col justify-between"
            >
              <div class="flex items-start gap-4 mb-3">
                <a href="/manga/{{ b.manga_id }}" class="flex-shrink-0">
                  <img
                    src="{{ b.cover_url }}"
                    alt="Cover"
                    class="w-12 h-16 object-cover rounded shadow-md"
                  />
                </a>

                <div class="flex-grow">
                  <a
                    href="/manga/{{ b.manga_id }}"
                    class="text-sm font-bold text-white hover:text-orange-500 transition block mb-1"
                  >
                    {{ b.manga_title }}
                  </a>
                  <p class="text-xs text-blue-400">
                    Read <span class="text-gray-500 ml-1">• saved</span>
                  </p>
                </div>

                <button
                  onclick="removeBookmarkCard('{{ b.manga_id }}')"
                  title="Remove Bookmark"
                  class="text-gray-500 hover:text-red-500 transition p-1"
                >
                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path
                      fill-rule="evenodd"
                      d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
                      clip-rule="evenodd"
                    ></path>
                  </svg>
                </button>
              </div>

              <input
                type="text"
                id="note-input-{{ b.manga_id }}"
                value="{{ b.note or '' }}"
                onchange="saveNote('{{ b.manga_id }}', this.value)"
                placeholder="Note here (Max 35 characters)"
                maxlength="35"
                class="w-full bg-[#242424] border border-gray-700 text-xs text-gray-300 rounded px-3 py-2 outline-none focus:border-orange-500 transition mt-auto"
              />
            </div>
          {% else %}
            <div class="col-span-full text-center py-12">
              <p class="text-gray-500 text-sm">
                You haven't bookmarked any manga yet.
              </p>
            </div>
          {% endfor %}
        </div>
      </div>
    </main>
    <footer class="bg-[#121212] border-t border-gray-800 pt-12 pb-10">
      <div
        class="max-w-7xl mx-auto px-8 flex flex-col items-center text-center"
      >
        <!-- 1. Hàng Menu Links -->
        <div
          class="flex flex-wrap justify-center gap-6 sm:gap-8 text-xs font-bold text-gray-500 uppercase mb-8"
        >
          <a href="/" class="hover:text-orange-500 transition">Home</a>
          <a href="/random" class="hover:text-orange-500 transition">Random</a>
          <a href="/privacy" class="hover:text-orange-500 transition"
            >Privacy Policy</a
          >
          <a href="#" class="hover:text-orange-500 transition">Contact</a>
        </div>

        <!-- 2. Hàng Phiên bản & Bản quyền (Đã thêm khoảng cách gap-2 để không bị dính) -->
        <div class="flex flex-col items-center gap-2 mb-8">
          <p class="text-[11px] text-gray-400 font-semibold tracking-widest">
            v2026.6.3
          </p>
          <p class="text-[11px] text-gray-500 tracking-wide">
            Copyright ©
            <span class="text-orange-500/90 font-bold">MangaLocal</span> 2026
          </p>
        </div>

        <!-- 3. Hàng Icon Thanh Toán -->
        <div class="flex justify-center items-center gap-3">
          <img
            src="{{ url_for('static', filename='icon/visa.svg') }}"
            alt="Visa"
            class="h-7 opacity-75 hover:opacity-100 transition duration-300 cursor-pointer"
          />
          <img
            src="{{ url_for('static', filename='icon/mastercard.svg') }}"
            alt="Mastercard"
            class="h-7 opacity-75 hover:opacity-100 transition duration-300 cursor-pointer"
          />
          <img
            src="{{ url_for('static', filename='icon/american.svg') }}"
            alt="American Express"
            class="h-7 opacity-75 hover:opacity-100 transition duration-300 cursor-pointer"
          />
        </div>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
