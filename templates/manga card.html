<a href="/manga/{{ manga.id }}" class="group block">
  <div
    class="relative aspect-[3/4] overflow-hidden rounded-xl border border-gray-800 group-hover:border-orange-500 transition-all duration-300 shadow-2xl"
  >
    <img
      src="{{ manga.cover }}"
      alt="{{ manga.title }}"
      class="w-full h-full object-cover group-hover:scale-110 transition duration-500"
      loading="lazy"
      referrerpolicy="no-referrer"
    />
    {% if manga.status %}
      <div
        class="absolute top-2 right-2 bg-black/80 backdrop-blur-md px-2 py-1 rounded text-[9px] font-black text-orange-500 border border-orange-500/20 uppercase tracking-tighter"
      >
        {{ manga.status }}
      </div>
    {% endif %}
  </div>
  <div class="mt-4 space-y-1">
    <p
      class="text-[13px] font-bold text-white truncate group-hover:text-orange-500 transition-colors"
    >
      {{ manga.title }}
    </p>
    <p class="text-[10px] text-gray-500 uppercase tracking-widest font-medium">
      {{ manga.type or 'Manga' }}
    </p>
  </div>
</a>
