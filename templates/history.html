<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Reading History - MangaLocal</title>
  </head>
  <body class="bg-black text-gray-200 min-h-screen flex flex-col">
    {% include 'nav.html' %}

    <main class="flex-grow bg-[#1a1a1a] pb-12">
      <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex items-center gap-3 mb-8">
          <svg
            class="w-6 h-6 text-orange-500"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
            ></path>
          </svg>
          <h1 class="text-2xl font-bold text-white">Reading History</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          {% for item in history %}
            <div
              class="bg-[#121212] rounded-lg p-4 border border-gray-800 flex flex-col justify-between hover:border-gray-600 transition group"
            >
              <div class="flex items-start gap-4">
                <a href="/manga/{{ item.manga_id }}" class="flex-shrink-0">
                  <img
                    src="{{ item.cover_url }}"
                    alt="Cover"
                    class="w-16 h-24 object-cover rounded shadow-md group-hover:scale-105 transition duration-300"
                  />
                </a>

                <div class="flex-grow">
                  <a
                    href="/manga/{{ item.manga_id }}"
                    class="text-sm font-bold text-white hover:text-orange-500 transition block mb-1 line-clamp-2"
                  >
                    {{ item.manga_title }}
                  </a>

                  <div
                    class="mt-2 inline-block bg-orange-500/10 border border-orange-500/20 px-2 py-1 rounded"
                  >
                    <p
                      class="text-[10px] font-bold text-orange-500 uppercase tracking-widest"
                    >
                      Left off: Episode {{ item.chapter_num }}
                    </p>
                  </div>
                </div>
              </div>

              <a
                href="/reader/{{ item.chapter_id }}"
                class="mt-4 w-full bg-zinc-800 hover:bg-orange-600 text-white text-center py-2 rounded text-[11px] font-bold uppercase tracking-widest transition"
              >
                Resume Reading
              </a>
            </div>
          {% else %}
            <div class="col-span-full text-center py-20">
              <p class="text-gray-500 text-sm">
                No reading history found. Start reading some manga!
              </p>
            </div>
          {% endfor %}
        </div>
      </div>
    </main>

    <footer class="bg-[#121212] border-t border-gray-800 pt-12 pb-8">
      <div class="max-w-7xl mx-auto px-8 text-center">
        <div
          class="flex justify-center gap-8 text-xs font-bold text-gray-500 uppercase mb-8"
        >
          <a href="/" class="hover:text-orange-500 transition">Home</a>
          <a href="/random" class="hover:text-orange-500 transition">Random</a>
          <a href="/privacy" class="hover:text-orange-500 transition"
            >Privacy Policy</a
          >
          <a href="#" class="hover:text-orange-500 transition">Contact</a>
        </div>
        <p class="text-[10px] text-gray-600 uppercase tracking-widest">
          Copyright © <span class="text-orange-500/80">MangaLocal</span>
        </p>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
